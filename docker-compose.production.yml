services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: lpup-app:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?Set APP_KEY}
      APP_URL: ${APP_URL:?Set APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      DB_QUEUE_RETRY_AFTER: ${DB_QUEUE_RETRY_AFTER:-1200}
      REDIS_QUEUE_RETRY_AFTER: ${REDIS_QUEUE_RETRY_AFTER:-1200}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_CLIENT: phpredis
      PRODUCT_IMPORT_DISK: ${PRODUCT_IMPORT_DISK:-local}
      PRODUCT_IMPORT_MAX_UPLOAD_KB: ${PRODUCT_IMPORT_MAX_UPLOAD_KB:-102400}
      SEED_DEMO_USERS: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - lpup-import-storage:/var/www/html/storage/app/private
    networks:
      - lpup

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: lpup-web:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - app
    networks:
      - lpup

  worker:
    image: lpup-app:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=900", "--sleep=3"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?Set APP_KEY}
      APP_URL: ${APP_URL:?Set APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      DB_QUEUE_RETRY_AFTER: ${DB_QUEUE_RETRY_AFTER:-1200}
      REDIS_QUEUE_RETRY_AFTER: ${REDIS_QUEUE_RETRY_AFTER:-1200}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_CLIENT: phpredis
      PRODUCT_IMPORT_DISK: ${PRODUCT_IMPORT_DISK:-local}
      PRODUCT_IMPORT_MAX_UPLOAD_KB: ${PRODUCT_IMPORT_MAX_UPLOAD_KB:-102400}
      SEED_DEMO_USERS: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - lpup-import-storage:/var/www/html/storage/app/private
    networks:
      - lpup

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:?Set DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME:?Set DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
    volumes:
      - lpup-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lpup

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - lpup

volumes:
  lpup-mysql-data:
  lpup-import-storage:

networks:
  lpup:
    driver: bridge
